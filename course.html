    .menu-btn { display: none; align-items: center; justify-content: center; width: 38px; height: 38px; background: var(--surf3); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; font-size: 18px; color: var(--text); }

    /* LAYOUT */
    .layout { display: grid; grid-template-columns: 290px 1fr; min-height: calc(100vh - 62px); }

    .module-wrap { border-bottom: 1px solid var(--border); }

      width: 100%; padding: 14px 20px;
      background: none; border: none; color: var(--text);
      font-family: var(--font); font-size: 13px; font-weight: 700;
      cursor: pointer; text-align: left; transition: background .15s;

    .module-btn:hover { background: var(--surf2); }
    .module-btn-left { display: flex; align-items: center; gap: 10px; }

    .tag-b2     { background: rgba(16,185,129,.2); color: var(--green); }
    .tag-locked { background: var(--surf3); color: var(--dim); opacity: .5; }
    .module-arrow { font-size: 11px; color: var(--dim); transition: transform .2s; }
    .module-arrow.open { transform: rotate(90deg); }
    .lessons-list { display: none; }
    .lessons-list.open { display: block; }

    .lesson-btn {
      display: flex; align-items: center; gap: 10px;
      width: 100%; padding: 10px 20px 10px 34px;
      background: none; border: none; border-left: 3px solid transparent;
      font-family: var(--font); font-size: 13px; color: var(--muted);

    .lesson-title { font-size: 28px; font-weight: 800; line-height: 1.25; margin-bottom: 12px; }

    .done-badge { color: var(--green) !important; font-weight: 600; }

    .video-wrap { background: #000; border-radius: var(--r); aspect-ratio: 16/9; overflow: hidden; margin-bottom: 28px; border: 1px solid var(--border); }
    .video-wrap iframe { width: 100%; height: 100%; border: none; display: block; }

    /* CONTENT BODY */
    .content-card { background: var(--surf); border: 1px solid var(--border); border-radius: var(--r); padding: 28px; margin-bottom: 20px; }
    .content-card h3 { font-size: 16px; font-weight: 700; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
    .content-card p { font-size: 14px; line-height: 1.8; color: var(--muted); margin-bottom: 12px; }
    .content-card p:last-child { margin-bottom: 0; }
    .content-card ul { list-style: none; }
    .content-card li { font-size: 14px; line-height: 1.75; color: var(--muted); padding: 7px 0 7px 22px; position: relative; border-bottom: 1px solid rgba(45,55,72,.6); }
    .content-card li:last-child { border-bottom: none; }
    .content-card li::before { content: '›'; position: absolute; left: 4px; color: var(--orange); font-size: 16px; font-weight: 700; }
    .content-card li strong { color: var(--text); }

    .hl { background: rgba(255,107,0,.07); border: 1px solid rgba(255,107,0,.2); border-left: 4px solid var(--orange); border-radius: 8px; padding: 14px 18px; margin: 16px 0; font-size: 14px; color: var(--text); font-weight: 500; line-height: 1.65; }
    .tip { background: rgba(16,185,129,.07); border: 1px solid rgba(16,185,129,.2); border-left: 4px solid var(--green); border-radius: 8px; padding: 14px 18px; margin: 16px 0; font-size: 13px; color: var(--muted); line-height: 1.7; }
    .tip strong { color: var(--green); }

    .script { background: var(--surf3); border: 1px solid var(--border); border-radius: 8px; padding: 20px 18px 16px; margin: 16px 0; font-size: 13px; line-height: 1.8; color: var(--text); font-style: italic; position: relative; }
    .script-lbl { position: absolute; top: -11px; left: 14px; background: var(--orange); color: #fff; font-size: 10px; font-weight: 700; padding: 2px 10px; border-radius: 20px; text-transform: uppercase; letter-spacing: .05em; font-style: normal; }

    /* INFO GRID */
    .info-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin: 18px 0; }
    .info-tile { background: var(--surf3); border: 1px solid var(--border); border-radius: 10px; padding: 16px; text-align: center; }
    .info-tile-icon { font-size: 28px; margin-bottom: 8px; }
    .info-tile-lbl { font-size: 11px; color: var(--dim); margin-bottom: 4px; }
    .info-tile-val { font-size: 13px; font-weight: 700; color: var(--text); }

    /* NAV */
    .lesson-nav { display: flex; align-items: center; justify-content: space-between; margin-top: 32px; gap: 12px; }
    .btn-prev, .btn-next { display: flex; align-items: center; gap: 8px; background: var(--surf); border: 1px solid var(--border); border-radius: 10px; padding: 12px 22px; font-family: var(--font); font-size: 14px; font-weight: 600; color: var(--muted); cursor: pointer; transition: all .15s; }
    .btn-prev:hover:not(:disabled), .btn-next:hover:not(:disabled) { background: var(--surf3); color: var(--text); border-color: var(--orange); }
    .btn-prev:disabled, .btn-next:disabled { opacity: .3; cursor: default; }
    .btn-done { background: linear-gradient(135deg, var(--orange), var(--orange-l)); border: none; border-radius: 10px; padding: 13px 30px; font-family: var(--font); font-size: 14px; font-weight: 800; color: #fff; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: opacity .2s, transform .1s; box-shadow: 0 4px 20px rgba(255,107,0,.3); }
    .btn-done:hover { opacity: .9; transform: translateY(-1px); }
    .btn-done.completed { background: linear-gradient(135deg, var(--green), #059669); box-shadow: 0 4px 20px rgba(16,185,129,.3); }

    /* OVERLAY */
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 140; }

    @media (max-width: 860px) {

      .info-grid { grid-template-columns: 1fr; }
      .menu-btn { display: flex; }
      .progress-wrap { display: none; }
      .hdr-sub { display: none; }
    }
  </style>
</head>

function render(idx) {
  cur = idx;
  const L = lessons[idx];
  const isDone = done.has(idx);

  let videoHtml = '';
  if (L.hasVideo && YT[idx]) {
    videoHtml = `<div class="video-wrap">
      <iframe
        src="https://www.youtube.com/embed/${YT[idx]}?rel=0&modestbranding=1"
        title="${L.title}"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen>
      </iframe>
    </div>`;
  }

  const prevDis = idx === 0 ? 'disabled' : '';
  const nextDis = idx === lessons.length - 1 ? 'disabled' : '';

  document.getElementById('main').innerHTML = `
    <div class="breadcrumb">
      <span>SoloShop</span><span class="sep">›</span>
      <span>${L.module}</span><span class="sep">›</span>
      <span class="cur">${L.tag}</span>
    </div>
    <div class="lesson-tag-chip">${L.tag}</div>
    <div class="lesson-title">${L.title}</div>
    <div class="lesson-meta">
      ${isDone ? '<span class="done-badge">✅ Đã hoàn thành</span>' : ''}
    </div>
    ${videoHtml}
    ${L.body}
    <div class="lesson-nav">
      <button class="btn-prev" onclick="go(${idx-1})" ${prevDis}>← Bài trước</button>
      <button class="btn-done ${isDone ? 'completed' : ''}" onclick="markDone(${idx})">
        ${isDone ? '✅ Đã hoàn thành' : '✓ Đánh dấu hoàn thành'}
      </button>
      <button class="btn-next" onclick="go(${idx+1})" ${nextDis}>Bài tiếp →</button>
    </div>
  `;

  // update sidebar
  for (let i = 0; i < lessons.length; i++) {
    const el = document.getElementById('lb' + i);
    if (!el) continue;
    el.classList.remove('active','done');
    if (i === idx) el.classList.add('active');
    else if (done.has(i)) el.classList.add('done');
  }

  updateProgress();
  window.scrollTo({ top: 0, behavior: 'smooth' });
  if (window.innerWidth <= 860) closeSidebar();
}

function go(idx) {
  if (idx < 0 || idx >= lessons.length) return;
  render(idx);
}

function markDone(idx) {
  done.add(idx);
  saveDone();
  render(idx);
}

function updateProgress() {
  const pct = Math.round((done.size / TOTAL) * 100);
  document.getElementById('prog-bar').style.width = pct + '%';
  document.getElementById('prog-txt').textContent = done.size + ' / ' + TOTAL + ' bài';
  document.getElementById('sidebar-count').textContent = done.size + ' / ' + TOTAL + ' bài đã hoàn thành';
}

function toggleMod(id) {
  const list = document.getElementById(id);
  const arrow = document.getElementById('arr-' + id);
  const open = list.classList.contains('open');
  list.classList.toggle('open', !open);
  arrow.classList.toggle('open', !open);
}

function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('overlay');
  const opening = !sb.classList.contains('open');
  sb.classList.toggle('open', opening);
  ov.classList.toggle('show', opening);
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

render(0);
</script>
