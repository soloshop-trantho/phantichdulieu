<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Phân tích — MỘCTEE</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0F0E13;color:#E8E4F0;min-height:100vh}
:root{--pink:#B5436A;--pink-light:#F5DCE5;--card:#1A1720;--border:#2E2A38;--muted:#7A7390;--green:#3DBE7A;--amber:#F5A623;--blue:#4A9FE0}

/* HEADER */
.hdr{background:#1A1720;border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-size:18px;font-weight:700;letter-spacing:-.02em;color:#fff}.logo em{font-style:normal;color:var(--pink)}
.hdr-right{display:flex;align-items:center;gap:12px}
.sheet-url{background:#0F0E13;border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-size:12px;color:var(--muted);width:320px;outline:none;transition:border .2s}
.sheet-url:focus{border-color:var(--pink);color:#fff}
.btn-load{background:var(--pink);color:#fff;border:none;border-radius:8px;padding:7px 16px;font-size:12.5px;font-weight:600;cursor:pointer;transition:opacity .2s}
.btn-load:hover{opacity:.85}
.btn-load:disabled{opacity:.4;cursor:not-allowed}

/* TABS */
.tabs{display:flex;gap:4px;padding:20px 24px 0;border-bottom:1px solid var(--border)}
.tab{padding:8px 18px;border-radius:8px 8px 0 0;font-size:13px;font-weight:500;cursor:pointer;color:var(--muted);border:1px solid transparent;border-bottom:none;transition:all .15s;background:transparent}
.tab.on{background:var(--card);border-color:var(--border);color:#fff}

/* CONTENT */
.content{padding:24px;max-width:1200px}

/* KPI CARDS */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:24px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 20px}
.kpi-label{font-size:11.5px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.kpi-val{font-size:28px;font-weight:700;line-height:1;margin-bottom:6px}
.kpi-sub{font-size:12px;color:var(--muted)}
.kpi-sub.up{color:var(--green)}.kpi-sub.dn{color:#E24B4A}
.kpi-val.blue{color:var(--blue)}.kpi-val.green{color:var(--green)}.kpi-val.amber{color:var(--amber)}.kpi-val.pink{color:var(--pink)}

/* CHARTS */
.charts{display:grid;grid-template-columns:2fr 1fr;gap:14px;margin-bottom:24px}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px}
.chart-title{font-size:14px;font-weight:600;margin-bottom:16px;color:#E8E4F0}
.chart-wrap{position:relative;height:220px}

/* TABLE */
.tbl-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:24px}
.tbl-hdr{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.tbl-hdr h3{font-size:14px;font-weight:600}
.badge{background:#1F1B2E;border:1px solid var(--border);border-radius:20px;padding:3px 10px;font-size:11.5px;color:var(--muted)}
table{width:100%;border-collapse:collapse}
th{padding:10px 20px;text-align:left;font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);border-bottom:1px solid var(--border)}
td{padding:12px 20px;font-size:13px;border-bottom:1px solid #1E1B28}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}
.status{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:500;padding:3px 10px;border-radius:20px}
.status.new{background:#1F2E3F;color:var(--blue)}
.status.done{background:#1B2E20;color:var(--green)}

/* EMPTY STATE */
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-ico{font-size:40px;margin-bottom:12px;opacity:.4}
.empty p{font-size:14px;line-height:1.7}
.empty strong{color:#E8E4F0}

/* STATUS BAR */
.status-bar{background:#1A1720;border-top:1px solid var(--border);padding:10px 24px;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);position:fixed;bottom:0;left:0;right:0}
.dot{width:7px;height:7px;border-radius:50%;background:var(--muted)}
.dot.green{background:var(--green)}
.dot.red{background:#E24B4A}

/* DEVICE BAR */
.dev-bars{margin-top:8px;display:flex;flex-direction:column;gap:8px}
.dev-row{display:flex;align-items:center;gap:10px;font-size:12.5px}
.dev-name{width:64px;color:var(--muted);flex-shrink:0}
.dev-bar-wrap{flex:1;height:8px;background:#1F1B2E;border-radius:4px;overflow:hidden}
.dev-bar-fill{height:100%;border-radius:4px;transition:width .8s cubic-bezier(.4,0,.2,1)}
.dev-pct{width:32px;text-align:right;font-size:12px;color:var(--muted);flex-shrink:0}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;gap:10px;padding:60px;color:var(--muted);font-size:14px}
.spin{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--pink);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:768px){
  .charts{grid-template-columns:1fr}
  .sheet-url{width:160px}
  .kpi-val{font-size:22px}
}
</style>
</head>
<body>

<div class="hdr">
  <div class="logo">MỘC<em>TEE</em> <span style="font-size:12px;color:var(--muted);font-weight:400;margin-left:6px">Phân tích</span></div>
  <div class="hdr-right">
    <input class="sheet-url" id="sheetUrl" type="text" placeholder="Dán URL Apps Script vào đây..."
      value="https://script.google.com/macros/s/AKfycbw8_2VRK0F6YeJ0MN9k0uYDUahQyWPgLVnUdRY44xcjd5oD7zmNEGhuzpiWz6IQlFIV/exec">
    <button class="btn-load" id="btnLoad" onclick="loadData()">Tải dữ liệu</button>
  </div>
</div>

<div class="tabs">
  <div class="tab on" onclick="setRange(1,this)">24 giờ</div>
  <div class="tab" onclick="setRange(7,this)">7 ngày</div>
  <div class="tab" onclick="setRange(30,this)">30 ngày</div>
</div>

<div class="content" id="content">
  <div class="empty">
    <div class="empty-ico">📊</div>
    <p>Bấm <strong>Tải dữ liệu</strong> để xem thống kê.<br>
    Cần cập nhật Apps Script và đưa code tracking vào shop trước.</p>
  </div>
</div>

<div class="status-bar">
  <div class="dot" id="statusDot"></div>
  <span id="statusText">Chưa kết nối</span>
</div>

<script>
const SHEET_URL = () => document.getElementById('sheetUrl').value.trim();
let currentDays = 1;
let chartLine = null, chartDev = null;
let lastData = null;

function setRange(days, el) {
  currentDays = days;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  el.classList.add('on');
  if (lastData) renderAll(lastData);
}

function setStatus(ok, msg) {
  document.getElementById('statusDot').className = 'dot ' + (ok ? 'green' : (ok===false ? 'red' : ''));
  document.getElementById('statusText').textContent = msg;
}

function genDemoData() {
  const now = new Date();
  const visits = [], orders = [];
  const names = ['Nguyễn Thị Lan','Trần Văn Bình','Lê Thị Mai','Phạm Văn Hùng','Hoàng Thị Thu','Đỗ Văn Nam','Vũ Thị Hoa','Bùi Văn Long'];
  const phones = ['0912 345 678','0987 654 321','0901 111 222','0933 456 789','0977 321 654','0966 789 123','0944 567 890','0955 234 567'];
  const products = [
    'Polo Sọc Cài Cúc – Đỏ – Size 2',
    'Áo Chống Nắng – Ghi Sáng – L',
    'Babytee Hot Trend – Đen – Free',
    'Giày TT Mã 10 – Viền Đỏ – 37',
    'Body Chữ Dập Nổi – Hồng – S',
    'Polo Form Ôm – Nâu – Size 3',
    'Typography Q18 – Vàng – M',
    'Áo Cổ Bẻ Sang Trọng – Trắng – L'
  ];
  const prices = [109000,108000,139000,130000,99000,99000,198000,159000];

  for (let i = 0; i < 30; i++) {
    const d = new Date(now - i * 24*60*60*1000);
    const cnt = Math.floor(Math.random()*60)+20;
    for (let j = 0; j < cnt; j++) {
      const h = Math.floor(Math.random()*24);
      const t = new Date(d); t.setHours(h, Math.floor(Math.random()*60));
      visits.push({t:t.toISOString(), dv: Math.random()<0.75?'mobile':'desktop'});
    }
    const oc = Math.floor(Math.random()*5)+1;
    for (let k = 0; k < oc; k++) {
      const h = Math.floor(Math.random()*24);
      const t = new Date(d); t.setHours(h, Math.floor(Math.random()*60));
      const idx = Math.floor(Math.random()*names.length);
      orders.push({t:t.toISOString(), id:'DH'+Math.floor(Math.random()*9000+1000), name:names[idx], phone:phones[idx], items:products[Math.floor(Math.random()*products.length)], total:prices[Math.floor(Math.random()*prices.length)]});
    }
  }
  return {visits, orders};
}

async function loadData() {
  const btn = document.getElementById('btnLoad');
  btn.disabled = true; btn.textContent = 'Đang tải...';
  setStatus(null, 'Đang kết nối...');
  document.getElementById('content').innerHTML = '<div class="loading"><div class="spin"></div>Đang tải dữ liệu từ Google Sheets...</div>';

  try {
    const url = SHEET_URL() + '?days=30&t=' + Date.now();
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    lastData = data;
    renderAll(data);
    setStatus(true, 'Kết nối thành công · Cập nhật ' + new Date().toLocaleTimeString('vi-VN'));
  } catch(e) {
    const demo = genDemoData();
    lastData = demo;
    renderAll(demo);
    setStatus(null, '⚠️ Không kết nối được — đang hiển thị dữ liệu mẫu minh họa');
  }
  btn.disabled = false; btn.textContent = 'Tải dữ liệu';
}

function filterByDays(arr, days) {
  const from = new Date(Date.now() - days * 24 * 60 * 60 * 1000);
  return arr.filter(r => new Date(r.t) >= from);
}

function fmt(n) { return Number(n).toLocaleString('vi-VN'); }

function renderAll(data) {
  const visits = filterByDays(data.visits || [], currentDays);
  const orders = filterByDays(data.orders || [], currentDays);

  const totalRevenue = orders.reduce((s, o) => s + (Number(o.total) || 0), 0);
  const convRate = visits.length > 0 ? (orders.length / visits.length * 100).toFixed(1) : 0;

  // Labels theo thời gian
  const labels = buildLabels(currentDays);
  const visitCounts = countByLabel(visits, labels, currentDays);
  const orderCounts = countByLabel(orders, labels, currentDays);

  // Device breakdown
  const mobile = visits.filter(v => v.dv === 'mobile').length;
  const desktop = visits.length - mobile;
  const mobPct = visits.length ? Math.round(mobile / visits.length * 100) : 0;
  const deskPct = 100 - mobPct;

  document.getElementById('content').innerHTML = `
    <div class="kpi-grid">
      <div class="kpi">
        <div class="kpi-label">Lượt truy cập</div>
        <div class="kpi-val blue">${fmt(visits.length)}</div>
        <div class="kpi-sub">${currentDays===1?'hôm nay':currentDays+' ngày qua'}</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Đơn hàng</div>
        <div class="kpi-val green">${fmt(orders.length)}</div>
        <div class="kpi-sub">${currentDays===1?'hôm nay':currentDays+' ngày qua'}</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Tỷ lệ chuyển đổi</div>
        <div class="kpi-val amber">${convRate}%</div>
        <div class="kpi-sub">Khách → Đơn hàng</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Doanh thu</div>
        <div class="kpi-val pink">${fmt(totalRevenue)}đ</div>
        <div class="kpi-sub">${currentDays===1?'hôm nay':currentDays+' ngày qua'}</div>
      </div>
    </div>

    <div class="charts">
      <div class="chart-card">
        <div class="chart-title">Lượt truy cập & Đơn hàng</div>
        <div class="chart-wrap"><canvas id="lineChart"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Thiết bị truy cập</div>
        <div style="padding:12px 0">
          <div style="font-size:13px;color:var(--muted);margin-bottom:16px">Tổng: ${fmt(visits.length)} lượt</div>
          <div class="dev-bars">
            <div class="dev-row">
              <div class="dev-name">Điện thoại</div>
              <div class="dev-bar-wrap"><div class="dev-bar-fill" style="width:${mobPct}%;background:var(--pink)"></div></div>
              <div class="dev-pct">${mobPct}%</div>
            </div>
            <div class="dev-row">
              <div class="dev-name">Máy tính</div>
              <div class="dev-bar-wrap"><div class="dev-bar-fill" style="width:${deskPct}%;background:var(--blue)"></div></div>
              <div class="dev-pct">${deskPct}%</div>
            </div>
          </div>
          <div style="margin-top:24px;border-top:1px solid var(--border);padding-top:16px">
            <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px">Đơn hàng theo giờ cao điểm</div>
            ${renderHourlyBars(orders)}
          </div>
        </div>
      </div>
    </div>

    <div class="tbl-card">
      <div class="tbl-hdr">
        <h3>Đơn hàng gần đây</h3>
        <span class="badge">${orders.length} đơn</span>
      </div>
      ${orders.length === 0 ? `
        <div class="empty" style="padding:40px">
          <div class="empty-ico" style="font-size:28px">📦</div>
          <p>Chưa có đơn hàng trong khoảng thời gian này</p>
        </div>` : `
      <table>
        <thead><tr>
          <th>Thời gian</th><th>Khách hàng</th><th>Sản phẩm</th><th>Tổng tiền</th><th>Trạng thái</th>
        </tr></thead>
        <tbody>
          ${[...orders].reverse().slice(0,20).map(o => `
          <tr>
            <td style="color:var(--muted)">${fmtTime(o.t)}</td>
            <td><div style="font-weight:500">${o.name||'—'}</div><div style="font-size:11.5px;color:var(--muted)">${o.phone||''}</div></td>
            <td style="font-size:12.5px;color:var(--muted);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${o.items||'—'}</td>
            <td style="font-weight:600;color:var(--pink)">${fmt(o.total)}đ</td>
            <td><span class="status new">🆕 Mới</span></td>
          </tr>`).join('')}
        </tbody>
      </table>`}
    </div>
  `;

  // Vẽ line chart
  const ctx = document.getElementById('lineChart').getContext('2d');
  if (chartLine) chartLine.destroy();
  chartLine = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        {label:'Lượt truy cập',data:visitCounts,borderColor:'#4A9FE0',backgroundColor:'rgba(74,159,224,.08)',tension:.4,pointRadius:3,pointBackgroundColor:'#4A9FE0',fill:true},
        {label:'Đơn hàng',data:orderCounts,borderColor:'#B5436A',backgroundColor:'rgba(181,67,106,.08)',tension:.4,pointRadius:3,pointBackgroundColor:'#B5436A',fill:true}
      ]
    },
    options: {
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'#7A7390',font:{size:12},boxWidth:12,usePointStyle:true}}},
      scales:{
        x:{grid:{color:'#1E1B28'},ticks:{color:'#7A7390',font:{size:11},maxRotation:0}},
        y:{grid:{color:'#1E1B28'},ticks:{color:'#7A7390',font:{size:11}},beginAtZero:true,grace:'10%'}
      }
    }
  });
}

function buildLabels(days) {
  const labels = [];
  const now = new Date();
  if (days === 1) {
    for (let h = 0; h < 24; h++) labels.push(h + 'h');
  } else {
    for (let d = days - 1; d >= 0; d--) {
      const date = new Date(now - d * 86400000);
      labels.push((date.getMonth()+1) + '/' + date.getDate());
    }
  }
  return labels;
}

function countByLabel(arr, labels, days) {
  return labels.map((_, i) => {
    const now = new Date();
    return arr.filter(r => {
      const d = new Date(r.t);
      if (days === 1) return d.getHours() === i;
      const dayAgo = days - 1 - i;
      const target = new Date(now - dayAgo * 86400000);
      return d.toDateString() === target.toDateString();
    }).length;
  });
}

function renderHourlyBars(orders) {
  const hours = Array(24).fill(0);
  orders.forEach(o => { const h = new Date(o.t).getHours(); hours[h]++; });
  const max = Math.max(...hours, 1);
  const peaks = [8,12,17,20,22];
  return '<div style="display:flex;align-items:flex-end;gap:2px;height:48px">' +
    hours.map((v,h) => {
      const pct = Math.round(v / max * 100);
      const isPeak = peaks.includes(h);
      return `<div title="${h}h: ${v} đơn" style="flex:1;height:${Math.max(pct,4)}%;background:${v>0?'var(--pink)':'#1F1B2E'};border-radius:2px 2px 0 0;transition:height .4s;opacity:${isPeak?.9:.5}"></div>`;
    }).join('') + '</div>' +
    '<div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-top:4px"><span>0h</span><span>6h</span><span>12h</span><span>18h</span><span>23h</span></div>';
}

function fmtTime(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('vi-VN') + ' ' + d.toLocaleTimeString('vi-VN', {hour:'2-digit',minute:'2-digit'});
}

// Auto-load nếu có URL
window.onload = () => {
  loadData();
};
</script>
</body>
</html>
